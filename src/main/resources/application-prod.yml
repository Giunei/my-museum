spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend:
    url: ${FRONTEND_URL:https://my-museum-ui-zeta.vercel.app}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

google:
  books:
    api:
      key: ${GOOGLE_BOOKS_API_KEY:}
      timeout-seconds: 4
      curated:
        concurrency: 4
      retry:
        max-attempts: 3
        first-backoff-ms: 200
        max-backoff-seconds: 2

tmdb:
  api:
    token: ${TMDB_API_TOKEN:}

steam:
  api:
    key: ${STEAM_API_KEY:}
  realm: ${STEAM_REALM:http://localhost:8080}

rawg:
  api:
    key: ${RAWG_API_KEY:}

riot:
  api:
    key: ${RIOT_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
