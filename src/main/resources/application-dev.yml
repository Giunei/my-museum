spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/my_museum
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  properties:
    hibernate:
      format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

app:
  frontend:
    url: http://localhost:4200

google:
  books:
    api:
      key: ${GOOGLE_BOOKS_API_KEY}
      timeout-seconds: 4
      curated:
        concurrency: 4
      retry:
        max-attempts: 3
        first-backoff-ms: 200
        max-backoff-seconds: 2

tmdb:
  api:
    token: ${TMDB_API_TOKEN}

steam:
  api:
    key: ${STEAM_API_KEY}
  realm: http://localhost:8080

rawg:
  api:
    key: ${RAWG_API_KEY}

riot:
  api:
    key: ${RIOT_API_KEY}
