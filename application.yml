spring:
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET}
  access:
    expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:7200000}
  refresh:
    expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}
