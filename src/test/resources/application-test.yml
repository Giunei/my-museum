spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
      - org.springframework.boot.mail.autoconfigure.MailSenderAutoConfiguration

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LWFuZC1pbnRlZ3JhdGlvbi10ZXN0cy1vbmx5
  access:
    expiration-ms: 3600000
  refresh:
    expiration-ms: 1209600000

tmdb:
  api:
    token: test-tmdb-token

google:
  books:
    api:
      key: test-google-books-key

rawg:
  api:
    key: test-rawg-key

steam:
  api:
    key: test-steam-key
  realm: http://localhost:8080

riot:
  api:
    key: test-riot-key

cloudinary:
  cloud-name: test
  api-key: test
  api-secret: test

app:
  frontend:
    url: http://localhost:4200
