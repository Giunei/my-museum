version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: my-museum-postgres
    restart: always
    environment:
      POSTGRES_DB: my_museum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: my-museum-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: