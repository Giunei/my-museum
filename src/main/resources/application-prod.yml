spring:
  autoconfigure:
    exclude:
      # Railway Hobby bloqueia SMTP; email em prod vai via Resend (HTTPS).
      - org.springframework.boot.mail.autoconfigure.MailSenderAutoConfiguration
      - org.springframework.boot.mail.autoconfigure.MailSenderValidatorAutoConfiguration
      - org.springframework.boot.mail.autoconfigure.MailHealthContributorAutoConfiguration

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      # Upstash: rediss://default:SENHA@HOST.upstash.io:6379
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
      ssl:
        enabled: ${REDIS_SSL:false}
      lettuce:
        shutdown-timeout: 2s

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM:My Museum <onboarding@resend.dev>}

app:
  frontend:
    url: ${FRONTEND_URL:https://my-museum-ui-zeta.vercel.app}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

google:
  books:
    api:
      key: ${GOOGLE_BOOKS_API_KEY:}
      timeout-seconds: 4
      curated:
        concurrency: 4
      retry:
        max-attempts: 3
        first-backoff-ms: 200
        max-backoff-seconds: 2

tmdb:
  api:
    token: ${TMDB_API_TOKEN:}

steam:
  api:
    key: ${STEAM_API_KEY:}
  realm: ${STEAM_REALM}

rawg:
  api:
    key: ${RAWG_API_KEY:}

riot:
  api:
    key: ${RIOT_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      show-components: always
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    mail:
      enabled: false

logging:
  level:
    root: INFO
    org.springframework.data.redis: INFO
    io.lettuce.core: WARN
